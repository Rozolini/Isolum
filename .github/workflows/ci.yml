name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: x86_64-unknown-none

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --workspace --exclude payload --all-targets --all-features -- -D warnings

      - name: Compile Workspace
        run: cargo build --workspace --exclude payload --all-targets --all-features

      - name: Build Guest Payload
        run: cargo build -p payload --target x86_64-unknown-none

      - name: Execute Tests
        run: cargo test --workspace --exclude payload --all-targets --all-features -- --test-threads=1