name: Miri

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  miri:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly with Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup default nightly

      - name: Run Miri
        # Miri cannot execute WHPX FFI calls, so we restrict it to unit tests in vmm-core
        run: cargo miri test -p vmm-core --lib --all-features